spring.application.name=persistence-service
server.port=8081
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/triptailor}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tripuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:trippassword}
spring.sql.init.mode=always
management.endpoints.web.exposure.include=health,info,prometheus
management.otlp.metrics.export.enabled=false
management.tracing.sampling.probability=${OTEL_TRACES_SAMPLER_ARG:0.0}
management.opentelemetry.tracing.export.otlp.endpoint=${TRACING_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
# Emit latency histogram buckets so Prometheus can compute p95/p99 via histogram_quantile.
management.metrics.distribution.percentiles-histogram.http.server.requests=true
