openapi: 3.0.3
info:
  title: TripTailor — GenAI API
  description: >
    Internal AI generation engine running on port 8000 (Python / FastAPI).
    Consumed only by the App API. Not exposed to the frontend.
  version: 1.0.0

servers:
  - url: http://localhost:8000

tags:
  - name: Schedules
  - name: Activities

paths:
  /schedules:
    post:
      tags: [Schedules]
      summary: Generate a full multi-day schedule
      operationId: aiGenerateSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerationPreferences"
      responses:
        "200":
          description: Generated schedule.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
        "502":
          description: >
            The upstream model returned output that could not be validated
            against the expected itinerary contract.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activities/alternative:
    post:
      tags: [Activities]
      summary: Suggest a replacement for a single activity
      description: >
        Returns a single replacement activity that fits the given instruction.
        The full `tripContext` is provided so the model can see every activity
        already present in the trip and avoid generating a duplicate.
        The `activity` field identifies which activity is being replaced and
        must NOT appear in the output.
      operationId: aiSuggestAlternative
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlternativeActivityRequest"
      responses:
        "200":
          description: Proposed replacement activity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "502":
          description: >
            The upstream model returned output that could not be validated
            against the expected activity contract.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          example: "Generated schedule did not match the expected format"

    GenerationPreferences:
      type: object
      required: [destination, startDate, endDate, vibe]
      properties:
        destination:
          type: string
          example: "Munich"
        startDate:
          type: string
          format: date
          example: "2026-05-15"
        endDate:
          type: string
          format: date
          example: "2026-05-18"
        vibe:
          type: string
          example: "Sporty and active"

    AlternativeActivityRequest:
      type: object
      required: [instruction, activity, tripContext]
      properties:
        instruction:
          type: string
          description: Free-text directive describing what should change.
          example: "Make this an indoor activity"
        activity:
          description: The activity that must be replaced.
          $ref: "#/components/schemas/Activity"
        tripContext:
          description: >
            The complete trip (all days and all activities) as currently
            persisted. The model uses this to understand the overall vibe,
            avoid scheduling conflicts, and ensure no duplicate titles or
            concepts appear in the output.
          $ref: "#/components/schemas/TripContext"

    TripContext:
      type: object
      required: [destination, startDate, endDate, vibe, days]
      description: >
        A trimmed view of the trip supplied as context to the model.
        Mirrors the App API Trip schema minus internal IDs that are
        irrelevant to generation quality.
      properties:
        destination:
          type: string
          example: "Munich"
        startDate:
          type: string
          format: date
          example: "2026-05-15"
        endDate:
          type: string
          format: date
          example: "2026-05-18"
        vibe:
          type: string
          example: "Sporty and active"
        days:
          type: array
          items:
            $ref: "#/components/schemas/Day"

    Schedule:
      type: object
      required: [days]
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/Day"

    Day:
      type: object
      required: [id, dayNumber, date, activities]
      properties:
        id:
          type: string
          format: uuid
        dayNumber:
          type: integer
          example: 1
        date:
          type: string
          format: date
          example: "2026-05-15"
        activities:
          type: array
          items:
            $ref: "#/components/schemas/Activity"

    Activity:
      type: object
      required: [id, dayId, timeBlock, title, description, durationMinutes]
      properties:
        id:
          type: string
          format: uuid
        dayId:
          type: string
          format: uuid
        timeBlock:
          $ref: "#/components/schemas/TimeBlock"
        title:
          type: string
          example: "Walking tour of the English Garden"
        description:
          type: string
          example: "Explore the vast parklands and enjoy a beer at the Chinese Tower."
        durationMinutes:
          type: integer
          example: 120
        isIndoor:
          type: boolean
          example: false
        tags:
          type: array
          items:
            $ref: "#/components/schemas/ActivityTag"
          example: [OUTDOOR, CULTURAL]

    TimeBlock:
      type: string
      enum: [MORNING, NOON, AFTERNOON, EVENING, NIGHT]

    ActivityTag:
      type: string
      enum:
        - OUTDOOR
        - INDOOR
        - CULTURAL
        - SPORTY
        - RELAXING
        - ADVENTUROUS
        - FOOD
        - SHOPPING
        - ENTERTAINMENT
        - FAMILY_FRIENDLY
        - PARTY
