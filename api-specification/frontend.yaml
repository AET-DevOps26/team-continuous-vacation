openapi: 3.0.3
info:
  title: TripTailor — App API
  description: >
    Public-facing Backend-for-Frontend running on port 8080.
    Consumed by the React frontend. Orchestrates calls to the
    Persistence API (8081) and GenAI API (8000).
  version: 1.0.0

servers:
  - url: http://localhost:8080

tags:
  - name: Trips
  - name: Activities

paths:
  /trips:
    get:
      tags: [Trips]
      summary: List all saved trips
      operationId: listTrips
      parameters:
        - $ref: "#/components/parameters/TravelerIdHeader"
      responses:
        "200":
          description: User's trip list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripSummary"

    post:
      tags: [Trips]
      summary: Generate and save a new trip
      description: >
        Calls the GenAI API to generate a schedule, then persists
        the result via the Persistence API.
      operationId: generateTrip
      parameters:
        - $ref: "#/components/parameters/TravelerIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerationPreferences"
      responses:
        "201":
          description: Trip generated and saved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "503":
          description: GenAI service unavailable or returned invalid output.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trips/{tripId}:
    get:
      tags: [Trips]
      summary: Get the full schedule of a trip
      operationId: getTrip
      parameters:
        - $ref: "#/components/parameters/TripIdPath"
        - $ref: "#/components/parameters/TravelerIdHeader"
      responses:
        "200":
          description: Full trip payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "404":
          description: Trip not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

    delete:
      tags: [Trips]
      summary: Delete a trip and all its days and activities
      operationId: deleteTrip
      parameters:
        - $ref: "#/components/parameters/TripIdPath"
        - $ref: "#/components/parameters/TravelerIdHeader"
      responses:
        "204":
          description: Trip deleted successfully.
        "404":
          description: Trip not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trips/{tripId}/days/{dayId}/activities/{activityId}:
    patch:
      tags: [Activities]
      summary: Regenerate a specific activity
      description: >
        Requests an AI-generated alternative from the GenAI API,
        then overwrites the record via the Persistence API.
      operationId: regenerateActivity
      parameters:
        - $ref: "#/components/parameters/TripIdPath"
        - $ref: "#/components/parameters/DayIdPath"
        - $ref: "#/components/parameters/ActivityIdPath"
        - $ref: "#/components/parameters/TravelerIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerationInstruction"
      responses:
        "200":
          description: Replacement activity saved and returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "404":
          description: Trip, day, or activity not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

    delete:
      tags: [Activities]
      summary: Delete a specific activity
      description: Removes a single activity. The parent day and trip are preserved.
      operationId: deleteActivity
      parameters:
        - $ref: "#/components/parameters/TripIdPath"
        - $ref: "#/components/parameters/DayIdPath"
        - $ref: "#/components/parameters/ActivityIdPath"
        - $ref: "#/components/parameters/TravelerIdHeader"
      responses:
        "204":
          description: Activity deleted successfully.
        "404":
          description: Trip, day, or activity not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  parameters:
    TravelerIdHeader:
      name: Traveler-Id
      in: header
      description: Traveler UUID (authenticated user or generated demo identity).
      required: true
      schema:
        type: string
        format: uuid
    TripIdPath:
      name: tripId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DayIdPath:
      name: dayId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ActivityIdPath:
      name: activityId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    GenerationPreferences:
      type: object
      required: [destination, startDate, endDate, vibe]
      properties:
        destination:
          type: string
          example: "Munich"
        startDate:
          type: string
          format: date
          example: "2026-05-15"
        endDate:
          type: string
          format: date
          example: "2026-05-18"
        vibe:
          type: string
          example: "Sporty and active"

    RegenerationInstruction:
      type: object
      required: [instruction]
      properties:
        instruction:
          type: string
          example: "Make this an indoor activity"

    TripSummary:
      type: object
      required: [id, destination, startDate, endDate]
      properties:
        id:
          type: string
          format: uuid
        destination:
          type: string
          example: "Munich"
        startDate:
          type: string
          format: date
          example: "2026-05-15"
        endDate:
          type: string
          format: date
          example: "2026-05-18"

    Trip:
      allOf:
        - $ref: "#/components/schemas/TripSummary"
        - type: object
          required: [vibe, schedule]
          properties:
            vibe:
              type: string
              example: "Sporty and active"
            schedule:
              $ref: "#/components/schemas/Schedule"

    Schedule:
      type: object
      required: [days]
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/Day"

    Day:
      type: object
      required: [id, dayNumber, date, activities]
      properties:
        id:
          type: string
          format: uuid
        dayNumber:
          type: integer
          example: 1
        date:
          type: string
          format: date
          example: "2026-05-15"
        activities:
          type: array
          items:
            $ref: "#/components/schemas/Activity"

    Activity:
      type: object
      required: [id, dayId, timeBlock, title, description, durationMinutes]
      properties:
        id:
          type: string
          format: uuid
        dayId:
          type: string
          format: uuid
          description: UUID of the parent Day. Set on creation; read-only thereafter.
        timeBlock:
          $ref: "#/components/schemas/TimeBlock"
        title:
          type: string
          example: "Walking tour of the English Garden"
        description:
          type: string
          example: "Explore the vast parklands and enjoy a beer at the Chinese Tower."
        durationMinutes:
          type: integer
          example: 120
        isIndoor:
          type: boolean
          example: false
        tags:
          type: array
          items:
            $ref: "#/components/schemas/ActivityTag"
          example: [OUTDOOR, CULTURAL]

    TimeBlock:
      type: string
      enum: [MORNING, NOON, AFTERNOON, EVENING, NIGHT]

    ActivityTag:
      type: string
      enum:
        - OUTDOOR
        - INDOOR
        - CULTURAL
        - SPORTY
        - RELAXING
        - ADVENTUROUS
        - FOOD
        - SHOPPING
        - FAMILY_FRIENDLY
        - PARTY

    ApiError:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          example: "TRIP_NOT_FOUND"
        title:
          type: string
          example: "Trip Not Found"
        detail:
          type: string
          example: "No trip with that ID exists for this traveler."
        status:
          type: integer
          example: 404
