openapi: 3.0.3
info:
  title: TripTailor — Persistence API
  description: >
    Internal database access layer running on port 8081.
    Consumed only by the App API. Not exposed to the frontend.
  version: 1.0.0

servers:
  - url: http://localhost:8081

tags:
  - name: Trips
  - name: Activities

paths:
  /trips:
    get:
      tags: [Trips]
      summary: Fetch all trips for a traveler
      operationId: dbListTrips
      parameters:
        - $ref: "#/components/parameters/TravelerIdQuery"
      responses:
        "200":
          description: List of trip summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripSummary"

    post:
      tags: [Trips]
      summary: Persist a new trip
      operationId: dbSaveTrip
      parameters:
        - $ref: "#/components/parameters/TravelerIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Trip"
      responses:
        "201":
          description: Trip saved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{tripId}:
    get:
      tags: [Trips]
      summary: Fetch a full trip by ID
      operationId: dbGetTrip
      parameters:
        - $ref: "#/components/parameters/TripIdPath"
        - $ref: "#/components/parameters/TravelerIdQuery"
      responses:
        "200":
          description: Full trip record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "404":
          description: Trip not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

    delete:
      tags: [Trips]
      summary: Delete a trip (cascades to days and activities)
      operationId: dbDeleteTrip
      parameters:
        - $ref: "#/components/parameters/TripIdPath"
        - $ref: "#/components/parameters/TravelerIdQuery"
      responses:
        "204":
          description: Trip and all child records deleted.
        "404":
          description: Trip not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trips/{tripId}/days/{dayId}/activities/{activityId}:
    put:
      tags: [Activities]
      summary: Overwrite an activity record
      description: Replaces a single activity without resending the whole trip.
      operationId: dbUpdateActivity
      parameters:
        - $ref: "#/components/parameters/TripIdPath"
        - $ref: "#/components/parameters/DayIdPath"
        - $ref: "#/components/parameters/ActivityIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Activity"
      responses:
        "200":
          description: Activity updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "404":
          description: Trip, day, or activity not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

    delete:
      tags: [Activities]
      summary: Delete a single activity record
      operationId: dbDeleteActivity
      parameters:
        - $ref: "#/components/parameters/TripIdPath"
        - $ref: "#/components/parameters/DayIdPath"
        - $ref: "#/components/parameters/ActivityIdPath"
      responses:
        "204":
          description: Activity deleted successfully.
        "404":
          description: Trip, day, or activity not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  parameters:
    TravelerIdQuery:
      name: travelerId
      in: query
      description: Traveler UUID passed between internal services.
      required: true
      schema:
        type: string
        format: uuid
    TripIdPath:
      name: tripId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DayIdPath:
      name: dayId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ActivityIdPath:
      name: activityId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    TripSummary:
      type: object
      required: [id, destination, startDate, endDate]
      properties:
        id:
          type: string
          format: uuid
        destination:
          type: string
          example: "Munich"
        startDate:
          type: string
          format: date
          example: "2026-05-15"
        endDate:
          type: string
          format: date
          example: "2026-05-18"

    Trip:
      allOf:
        - $ref: "#/components/schemas/TripSummary"
        - type: object
          required: [vibe, schedule]
          properties:
            vibe:
              type: string
              example: "Sporty and active"
            schedule:
              $ref: "#/components/schemas/Schedule"

    Schedule:
      type: object
      required: [days]
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/Day"

    Day:
      type: object
      required: [id, dayNumber, date, activities]
      properties:
        id:
          type: string
          format: uuid
        dayNumber:
          type: integer
          example: 1
        date:
          type: string
          format: date
          example: "2026-05-15"
        activities:
          type: array
          items:
            $ref: "#/components/schemas/Activity"

    Activity:
      type: object
      required: [id, dayId, timeBlock, title, description, durationMinutes]
      properties:
        id:
          type: string
          format: uuid
        dayId:
          type: string
          format: uuid
          description: UUID of the parent Day. Set on creation; read-only thereafter.
        timeBlock:
          $ref: "#/components/schemas/TimeBlock"
        title:
          type: string
          example: "Walking tour of the English Garden"
        description:
          type: string
          example: "Explore the vast parklands and enjoy a beer at the Chinese Tower."
        durationMinutes:
          type: integer
          example: 120
        isIndoor:
          type: boolean
          example: false
        tags:
          type: array
          items:
            $ref: "#/components/schemas/ActivityTag"
          example: [OUTDOOR, CULTURAL]

    TimeBlock:
      type: string
      enum: [MORNING, NOON, AFTERNOON, EVENING, NIGHT]

    ActivityTag:
      type: string
      enum:
        - OUTDOOR
        - INDOOR
        - CULTURAL
        - SPORTY
        - RELAXING
        - ADVENTUROUS
        - FOOD
        - SHOPPING
        - FAMILY_FRIENDLY
        - PARTY

    ApiError:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          example: "TRIP_NOT_FOUND"
        title:
          type: string
          example: "Trip Not Found"
        detail:
          type: string
          example: "No trip with that ID exists for this traveler."
        status:
          type: integer
          example: 404
