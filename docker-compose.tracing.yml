services:
  tempo:
    image: grafana/tempo:2.9.0
    container_name: triptailor-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./infrastructure/observability/tempo.yaml:/etc/tempo/tempo.yaml:ro

  grafana:
    image: grafana/grafana:12.3.0
    container_name: triptailor-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./infrastructure/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - tempo

  backend:
    environment:
      - TRACING_OTLP_ENDPOINT=http://tempo:4318/v1/traces
      - OTEL_TRACES_SAMPLER_ARG=1.0
    depends_on:
      tempo:
        condition: service_started

  persistence-service:
    environment:
      - TRACING_OTLP_ENDPOINT=http://tempo:4318/v1/traces
      - OTEL_TRACES_SAMPLER_ARG=1.0
    depends_on:
      tempo:
        condition: service_started

  genai-service:
    environment:
      - OTEL_SERVICE_NAME=genai-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_PROPAGATORS=tracecontext,baggage
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=1.0
    depends_on:
      tempo:
        condition: service_started

  travel-context-service:
    environment:
      - OTEL_SERVICE_NAME=travel-context-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_PROPAGATORS=tracecontext,baggage
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=1.0
    depends_on:
      tempo:
        condition: service_started
