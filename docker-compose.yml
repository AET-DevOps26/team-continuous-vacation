services:
  gateway:
    image: nginx:1.27-alpine
    container_name: triptailor-gateway
    ports:
      - "3000:80"
    volumes:
      - ./infrastructure/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  db:
    image: postgres:17-alpine
    container_name: triptailor-db
    environment:
      POSTGRES_USER: tripuser
      POSTGRES_PASSWORD: trippassword
      POSTGRES_DB: triptailor
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripuser -d triptailor"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      additional_contexts:
        api-spec: ./api-specification
    container_name: triptailor-backend
    expose:
      - "8080"
    environment:
      - PERSISTENCE_BASE_URL=http://persistence-service:8081
      - GENAI_BASE_URL=http://genai-service:8000
    depends_on:
      persistence-service:
        condition: service_started
      genai-service:
        condition: service_healthy

  persistence-service:
    build:
      context: ./persistence-service
      additional_contexts:
        api-spec: ./api-specification
    container_name: triptailor-persistence
    expose:
      - "8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/triptailor
      - SPRING_DATASOURCE_USERNAME=tripuser
      - SPRING_DATASOURCE_PASSWORD=trippassword
    depends_on:
      db:
        condition: service_healthy
      genai-service:
        condition: service_healthy

  genai-service:
    build:
      context: ./genai-service
    container_name: triptailor-genai
    expose:
      - "8000"
    environment:
      - TRAVEL_CONTEXT_BASE_URL=http://travel-context-service:8090
    env_file:
      - path: ./genai-service/.env.example
      - path: ./genai-service/.env
        required: false
    depends_on:
      travel-context-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  travel-context-service:
    build:
      context: ./travel-context-service
    container_name: triptailor-travel-context
    ports:
      - "8090:8090"
    env_file:
      - path: ./travel-context-service/.env.example
      - path: ./travel-context-service/.env
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      additional_contexts:
        api-spec: ./api-specification
    container_name: triptailor-frontend
    expose:
      - "3000"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v3.11.0
    container_name: triptailor-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
      - persistence-service
      - genai-service
      - travel-context-service

volumes:
  pgdata:
    driver: local
  prometheus-data:
    driver: local
