services:
  db:
    image: postgres:17-alpine
    container_name: triptailor-db
    environment:
      POSTGRES_USER: tripuser
      POSTGRES_PASSWORD: trippassword
      POSTGRES_DB: triptailor
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripuser -d triptailor"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      additional_contexts:
        api-spec: ./api-specification
    container_name: triptailor-backend
    ports:
      - "8080:8080"
    environment:
      - PERSISTENCE_BASE_URL=http://persistence-service:8081
      - GENAI_BASE_URL=http://genai-service:8000
    depends_on:
      persistence-service:
        condition: service_started
      genai-service:
        condition: service_healthy

  persistence-service:
    build:
      context: ./persistence-service
      additional_contexts:
        api-spec: ./api-specification
    container_name: triptailor-persistence
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/triptailor
      - SPRING_DATASOURCE_USERNAME=tripuser
      - SPRING_DATASOURCE_PASSWORD=trippassword
    depends_on:
      db:
        condition: service_healthy
      genai-service:
        condition: service_healthy

  genai-service:
    build:
      context: ./genai-service
    container_name: triptailor-genai
    ports:
      - "8000:8000"
    environment:
      - TRAVEL_CONTEXT_BASE_URL=http://travel-context-service:8090
    env_file:
      - ./genai-service/.env.example
      - ./genai-service/.env
    depends_on:
      travel-context-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  travel-context-service:
    build:
      context: ./travel-context-service
    container_name: triptailor-travel-context
    ports:
      - "8090:8090"
    env_file:
      - ./travel-context-service/.env.example
      - ./travel-context-service/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      additional_contexts:
        api-spec: ./api-specification
    container_name: triptailor-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
