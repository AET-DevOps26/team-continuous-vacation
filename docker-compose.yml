services:
  db:
    image: postgres:17-alpine
    container_name: triptailor-db
    environment:
      POSTGRES_USER: tripuser
      POSTGRES_PASSWORD: trippassword
      POSTGRES_DB: triptailor
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripuser -d triptailor"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: triptailor-backend
    ports:
      - "8080:8080"
    environment:
      - PERSISTENCE_BASE_URL=http://persistence-service:8081
    depends_on:
      persistence-service:
        condition: service_started

  persistence-service:
    build:
      context: ./persistence-service
    container_name: triptailor-persistence
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/triptailor
      - SPRING_DATASOURCE_USERNAME=tripuser
      - SPRING_DATASOURCE_PASSWORD=trippassword
    depends_on:
      db:
        condition: service_healthy
      genai-service:
        condition: service_healthy

  genai-service:
    build:
      context: ./genai-service
    container_name: triptailor-genai
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MODEL_NAME=${MODEL_NAME:-gpt-4}
      - TEMPERATURE=${TEMPERATURE:-0.7}
      - MAX_TOKENS=${MAX_TOKENS:-2000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: triptailor-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
