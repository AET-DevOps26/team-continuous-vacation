name: TripTailor CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Run Linter
        run: npm run lint
      - name: Run Tests
        run: npm run test
      - name: Generate coverage report
        run: npm run test:coverage
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: error
      - name: Build
        run: npm run build

  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build and Test with Gradle
        run: ./gradlew build
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/build/reports/jacoco/test/
          if-no-files-found: error

  build-persistence-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./persistence-service
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build and Test with Gradle
        run: ./gradlew build
      - name: Upload persistence coverage
        uses: actions/upload-artifact@v4
        with:
          name: persistence-service-coverage
          path: persistence-service/build/reports/jacoco/test/
          if-no-files-found: error

  build-genai:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./genai-service
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            ./genai-service/requirements.txt
            ./genai-service/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Lint with flake8
        run: flake8 app tests --count --show-source --statistics
      - name: Type check with mypy
        run: mypy app
      - name: Test with coverage
        run: |
          pytest --verbose --cov=app --cov-report=term-missing --cov-report=xml --cov-report=html
      - name: Upload GenAI coverage
        uses: actions/upload-artifact@v4
        with:
          name: genai-service-coverage
          path: |
            genai-service/coverage.xml
            genai-service/htmlcov/
          if-no-files-found: error

  build-travel-context:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./travel-context-service
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            ./travel-context-service/requirements.txt
            ./travel-context-service/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Lint with flake8
        run: flake8 app tests --count --show-source --statistics
      - name: Type check with mypy
        run: mypy app
      - name: Test with coverage
        run: |
          pytest --verbose --cov=app --cov-report=term-missing --cov-report=xml --cov-report=html
      - name: Upload travel context coverage
        uses: actions/upload-artifact@v4
        with:
          name: travel-context-service-coverage
          path: |
            travel-context-service/coverage.xml
            travel-context-service/htmlcov/
          if-no-files-found: error

  verify-docker-compose:
    needs: [build-frontend, build-backend, build-genai, build-persistence-service, build-travel-context]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker images
        run: docker compose build
