spring.application.name=backend
server.port=8080
services.persistence.base-url=${PERSISTENCE_BASE_URL:http://localhost:8081}
services.genai.base-url=${GENAI_BASE_URL:http://localhost:8000}
management.endpoints.web.exposure.include=health,info,prometheus
management.otlp.metrics.export.enabled=false
management.tracing.sampling.probability=${OTEL_TRACES_SAMPLER_ARG:0.0}
management.opentelemetry.tracing.export.otlp.endpoint=${TRACING_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
# Emit latency histogram buckets so Prometheus can compute p95/p99 via histogram_quantile.
management.metrics.distribution.percentiles-histogram.http.server.requests=true
security.jwt.secret=${JWT_SECRET:dev-only-change-this-secret-to-at-least-32-bytes}
security.jwt.issuer=${JWT_ISSUER:triptailor-app-api}
security.jwt.ttl-days=${JWT_TTL_DAYS:30}
