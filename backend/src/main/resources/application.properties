spring.application.name=demo
spring.application.name=triptailor-app-api
server.port=8080
services.persistence.base-url=${PERSISTENCE_BASE_URL:http://localhost:8081}
services.genai.base-url=${GENAI_BASE_URL:http://localhost:8000}
management.endpoints.web.exposure.include=health,info,prometheus
# Emit latency histogram buckets so Prometheus can compute p95/p99 via histogram_quantile.
management.metrics.distribution.percentiles-histogram.http.server.requests=true
security.jwt.secret=${JWT_SECRET:dev-only-change-this-secret-to-at-least-32-bytes}
security.jwt.issuer=${JWT_ISSUER:triptailor-app-api}
security.jwt.ttl-days=${JWT_TTL_DAYS:30}
