openapi: 3.0.3
info:
  title: TripTailor — App API
  description: >
    Public-facing Backend-for-Frontend running on port 8080.
    Consumed by the React frontend. Orchestrates calls to the
    Persistence API (8081) and GenAI API (8000).
    Authentication uses Spring Security bearer JWTs issued by the Auth
    endpoints. Tokens are valid for 30 days by default.
  version: 1.0.0

servers:
  - url: /

tags:
  - name: System
  - name: Auth
  - name: Trips
  - name: Activities

paths:
  /health:
    get:
      tags: [System]
      summary: Check service health
      operationId: getHealth
      responses:
        "200":
          description: Service is running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new traveler account
      description: >
        Creates a persistent traveler account with e-mail and password.
        Returns a bearer token to be sent as `Authorization: Bearer <token>`
        on subsequent requests.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: E-mail address already registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in with e-mail and password
      description: >
        Authenticates an existing traveler and returns their UUID.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/demo:
    post:
      tags: [Auth]
      summary: Create an anonymous demo session
      description: >
        Instantly provisions a temporary traveler identity — no e-mail or
        password required. The returned UUID can be used identically to a
        registered traveler's UUID. Demo accounts and their trips are
        eligible for automatic cleanup after a configurable TTL.
      operationId: createDemoSession
      responses:
        "201":
          description: Demo identity created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /trips:
    get:
      tags: [Trips]
      summary: List all saved trips
      operationId: listTrips
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User's trip list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripSummary"

    post:
      tags: [Trips]
      summary: Generate and save a new trip
      description: >
        Calls the GenAI API to generate a schedule, then persists
        the result via the Persistence API.
      operationId: generateTrip
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerationPreferences"
      responses:
        "201":
          description: Trip generated and saved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "503":
          description: GenAI service unavailable or returned invalid output.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trips/{tripId}:
    get:
      tags: [Trips]
      summary: Get the full schedule of a trip
      operationId: getTrip
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TripIdPath"
      responses:
        "200":
          description: Full trip payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "404":
          description: Trip not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

    delete:
      tags: [Trips]
      summary: Delete a trip and all its days and activities
      operationId: deleteTrip
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TripIdPath"
      responses:
        "204":
          description: Trip deleted successfully.
        "404":
          description: Trip not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trips/{tripId}/days/{dayId}/activities/{activityId}:
    patch:
      tags: [Activities]
      summary: Regenerate a specific activity
      description: >
        Fetches the current full trip from the Persistence API, then calls
        the GenAI API with the complete trip as context so the replacement
        activity does not duplicate any existing activity.
        The new activity is persisted via the Persistence API and returned.
      operationId: regenerateActivity
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TripIdPath"
        - $ref: "#/components/parameters/DayIdPath"
        - $ref: "#/components/parameters/ActivityIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerationInstruction"
      responses:
        "200":
          description: Replacement activity saved and returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "404":
          description: Trip, day, or activity not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

    delete:
      tags: [Activities]
      summary: Delete a specific activity
      description: Removes a single activity. The parent day and trip are preserved.
      operationId: deleteActivity
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TripIdPath"
        - $ref: "#/components/parameters/DayIdPath"
        - $ref: "#/components/parameters/ActivityIdPath"
      responses:
        "204":
          description: Activity deleted successfully.
        "404":
          description: Trip, day, or activity not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TripIdPath:
      name: tripId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DayIdPath:
      name: dayId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ActivityIdPath:
      name: activityId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: "UP"

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "ada@example.com"
        password:
          type: string
          format: password
          minLength: 8
          example: "s3cr3tP@ss"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "ada@example.com"
        password:
          type: string
          format: password
          example: "s3cr3tP@ss"

    AuthResponse:
      type: object
      required: [travelerId, isDemo, accessToken, tokenType, expiresAt]
      properties:
        travelerId:
          type: string
          format: uuid
          description: >
            Traveler UUID encoded as the JWT subject.
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        isDemo:
          type: boolean
          description: >
            True for accounts created via POST /auth/demo.
            Demo accounts may be cleaned up automatically after a TTL.
          example: false
        accessToken:
          type: string
          description: JWT bearer token signed by the App API.
          example: "eyJhbGciOiJIUzI1NiJ9..."
        tokenType:
          type: string
          example: "Bearer"
        expiresAt:
          type: string
          format: date-time
          description: Token expiry. Defaults to 30 days after issue time.
          example: "2026-06-14T10:30:00Z"

    GenerationPreferences:
      type: object
      required: [destination, startDate, endDate, vibe]
      properties:
        destination:
          type: string
          example: "Munich"
        startDate:
          type: string
          format: date
          example: "2026-05-15"
        endDate:
          type: string
          format: date
          example: "2026-05-18"
        vibe:
          type: string
          example: "Sporty and active"

    RegenerationInstruction:
      type: object
      required: [instruction]
      description: >
        The App API automatically attaches the full trip (fetched from the
        Persistence API) before forwarding to the GenAI API — the frontend
        only needs to supply the free-text instruction.
      properties:
        instruction:
          type: string
          example: "Make this an indoor activity"

    TripSummary:
      type: object
      required: [id, destination, startDate, endDate]
      properties:
        id:
          type: string
          format: uuid
        destination:
          type: string
          example: "Munich"
        startDate:
          type: string
          format: date
          example: "2026-05-15"
        endDate:
          type: string
          format: date
          example: "2026-05-18"

    Trip:
      allOf:
        - $ref: "#/components/schemas/TripSummary"
        - type: object
          required: [vibe, schedule]
          properties:
            vibe:
              type: string
              example: "Sporty and active"
            schedule:
              $ref: "#/components/schemas/Schedule"

    Schedule:
      type: object
      required: [days]
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/Day"

    Day:
      type: object
      required: [id, dayNumber, date, activities]
      properties:
        id:
          type: string
          format: uuid
        dayNumber:
          type: integer
          example: 1
        date:
          type: string
          format: date
          example: "2026-05-15"
        activities:
          type: array
          items:
            $ref: "#/components/schemas/Activity"

    Activity:
      type: object
      required: [id, dayId, timeBlock, title, description, durationMinutes]
      properties:
        id:
          type: string
          format: uuid
        dayId:
          type: string
          format: uuid
          description: UUID of the parent Day. Set on creation; read-only thereafter.
        timeBlock:
          $ref: "#/components/schemas/TimeBlock"
        title:
          type: string
          example: "Walking tour of the English Garden"
        description:
          type: string
          example: "Explore the vast parklands and enjoy a beer at the Chinese Tower."
        durationMinutes:
          type: integer
          example: 120
        isIndoor:
          type: boolean
          example: false
        tags:
          type: array
          items:
            $ref: "#/components/schemas/ActivityTag"
          example: [OUTDOOR, CULTURAL]

    TimeBlock:
      type: string
      enum: [MORNING, NOON, AFTERNOON, EVENING, NIGHT]

    ActivityTag:
      type: string
      enum:
        - OUTDOOR
        - INDOOR
        - CULTURAL
        - SPORTY
        - RELAXING
        - ADVENTUROUS
        - FOOD
        - SHOPPING
        - FAMILY_FRIENDLY
        - PARTY

    ApiError:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          example: "TRIP_NOT_FOUND"
        title:
          type: string
          example: "Trip Not Found"
        detail:
          type: string
          example: "No trip with that ID exists for this traveler."
        status:
          type: integer
          example: 404
