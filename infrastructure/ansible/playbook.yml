---
- name: Deploy TripTailor to Azure VM
  hosts: triptailor
  become: true
  vars:
    app_dir: /opt/triptailor
    repo_url: "https://github.com/AET-DevOps26/team-continuous-vacation.git"
    branch: main
    swap_file: /swapfile
    swap_size_mb: 8192

  tasks:
    # --- Memory safety net: the VM has ~1 GiB RAM, but building the two Gradle
    # (JVM) images plus the node frontend peaks well above that. Without swap the
    # OOM killer thrashes and the box goes unresponsive. A swapfile absorbs the
    # build-time burst; at runtime the services fit in RAM so swap stays cold.
    - name: Create swapfile
      command: "fallocate -l {{ swap_size_mb }}M {{ swap_file }}"
      args:
        creates: "{{ swap_file }}"

    - name: Secure swapfile permissions
      file:
        path: "{{ swap_file }}"
        owner: root
        group: root
        mode: "0600"

    # mkswap refuses to run against a swapfile that is already mounted/active
    # (a re-run of this playbook), so check the active swaps first and only
    # format when this file is not yet in use.
    - name: Check active swap devices
      command: swapon --noheadings --show=NAME
      register: active_swap
      changed_when: false

    - name: Format swapfile
      command: "mkswap {{ swap_file }}"
      register: mkswap_result
      when: swap_file not in active_swap.stdout
      changed_when: "'Setting up swapspace' in mkswap_result.stdout"

    - name: Enable swapfile
      command: "swapon {{ swap_file }}"
      register: swapon_result
      when: swap_file not in active_swap.stdout
      changed_when: swapon_result.rc == 0

    - name: Persist swapfile in fstab
      mount:
        path: none
        src: "{{ swap_file }}"
        fstype: swap
        opts: sw
        state: present

    - name: Tune swappiness (prefer RAM, swap only under pressure)
      sysctl:
        name: vm.swappiness
        value: "10"
        state: present
        reload: true

    - name: Install prerequisites
      apt:
        name: [apt-transport-https, ca-certificates, curl, gnupg, lsb-release, git]
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo ${VERSION_CODENAME}) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        state: present
        update_cache: true

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Clone or update repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ branch }}"
        force: true

    - name: Copy environment file for genai-service
      copy:
        dest: "{{ app_dir }}/genai-service/.env"
        content: |
          LLM_PROVIDER=azure
          AZURE_LLM_API_KEY={{ azure_llm_api_key }}
          AZURE_LLM_BASE_URL={{ azure_llm_base_url }}
          AZURE_LLM_API_VERSION=2024-12-01-preview
          MODEL_NAME=gpt-5-nano
          TEMPERATURE=0.7
          MAX_TOKENS=8000
          LOG_LEVEL=INFO
        mode: "0600"
      when: azure_llm_api_key is defined

    - name: Copy environment file for travel-context-service
      copy:
        dest: "{{ app_dir }}/travel-context-service/.env"
        content: |
          NOMINATIM_BASE_URL=https://nominatim.openstreetmap.org
          PHOTON_BASE_URL=https://photon.komoot.io
          OVERPASS_BASE_URL=https://overpass-api.de/api/interpreter
          SERPAPI_BASE_URL=https://serpapi.com/search
          SERPAPI_API_KEY={{ serpapi_api_key | default('') }}
          HTTP_USER_AGENT=TripTailor/1.0 (https://github.com/AET-DevOps26/team-continuous-vacation)
          PLACE_SEARCH_RADIUS_METERS=8000
          PLACE_SEARCH_LIMIT=40
          EVENT_SEARCH_LIMIT=10
          OVERPASS_TIMEOUT_SECONDS=12
          CACHE_TTL_SECONDS=21600
          LOG_LEVEL=INFO
        mode: "0600"
      no_log: true

    # Build images one service at a time. The default `up --build` builds every
    # service in parallel, so both Gradle JVMs (+ node) compile at once and blow
    # the memory budget. Serial builds keep only one heavy compile in flight, and
    # the Gradle heap is capped so a single build can't balloon either.
    - name: Build images sequentially
      shell: docker compose build {{ item }}
      args:
        chdir: "{{ app_dir }}"
      environment:
        DOCKER_BUILDKIT: "1"
      loop:
        - persistence-service
        - backend
        - frontend
        - genai-service
        - travel-context-service

    - name: Start services
      shell: docker compose up -d --force-recreate
      args:
        chdir: "{{ app_dir }}"

    - name: Wait for services
      shell: docker compose ps
      args:
        chdir: "{{ app_dir }}"
      register: compose_status
      retries: 6
      delay: 10
      until: compose_status.rc == 0
