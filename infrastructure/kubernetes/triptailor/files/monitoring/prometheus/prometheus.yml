# Single source of truth for Prometheus scrape + alerting config.
# Consumed by BOTH docker-compose (bind mount via repo-root `monitoring` symlink)
# and the Helm chart (loaded into a ConfigMap via .Files.Get).
#
# Service hostnames below resolve identically in both environments because the
# Kubernetes Service names match the docker-compose service names.
global:
  scrape_interval: 10s
  evaluation_interval: 5s

rule_files:
  - alert.rules.yml

scrape_configs:
  # Spring Boot services expose Micrometer metrics at /actuator/prometheus.
  - job_name: backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend:8080"]

  - job_name: persistence-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["persistence-service:8081"]

  # FastAPI services expose prometheus-fastapi-instrumentator metrics at /metrics.
  - job_name: genai-service
    metrics_path: /metrics
    static_configs:
      - targets: ["genai-service:8000"]

  - job_name: travel-context-service
    metrics_path: /metrics
    static_configs:
      - targets: ["travel-context-service:8090"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
