apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.persistenceService.service.name }}
  labels:
    app.kubernetes.io/component: persistence-service
    {{- include "triptailor.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.persistenceService.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/component: persistence-service
    {{- include "triptailor.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.persistenceService.service.name }}
  labels:
    app.kubernetes.io/component: persistence-service
    {{- include "triptailor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.persistenceService.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: persistence-service
      {{- include "triptailor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: persistence-service
        {{- include "triptailor.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "triptailor.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: persistence-service
          image: "{{ .Values.persistenceService.image.repository }}:{{ .Values.persistenceService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.persistenceService.service.port }}
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "triptailor.fullname" . }}-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "triptailor.fullname" . }}-config
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "triptailor.fullname" . }}-secret
                  key: SPRING_DATASOURCE_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            {{- toYaml .Values.persistenceService.resources | nindent 12 }}
