apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.travelContextService.service.name }}
  labels:
    app.kubernetes.io/component: travel-context-service
    {{- include "triptailor.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.travelContextService.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/component: travel-context-service
    {{- include "triptailor.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.travelContextService.service.name }}
  labels:
    app.kubernetes.io/component: travel-context-service
    {{- include "triptailor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.travelContextService.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: travel-context-service
      {{- include "triptailor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: travel-context-service
        {{- include "triptailor.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "triptailor.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: travel-context-service
          image: "{{ .Values.travelContextService.image.repository }}:{{ .Values.travelContextService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.travelContextService.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "triptailor.fullname" . }}-config
          env:
            - name: SERPAPI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "triptailor.fullname" . }}-secret
                  key: SERPAPI_API_KEY
            {{- if .Values.tracing.enabled }}
            - name: OTEL_SERVICE_NAME
              value: travel-context-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.tracing.otlpEndpoint | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: none
            - name: OTEL_LOGS_EXPORTER
              value: none
            - name: OTEL_PROPAGATORS
              value: tracecontext,baggage
            - name: OTEL_TRACES_SAMPLER
              value: parentbased_traceidratio
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ .Values.tracing.samplingProbability | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.travelContextService.resources | nindent 12 }}
