apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.genaiService.service.name }}
  labels:
    app.kubernetes.io/component: genai-service
    {{- include "triptailor.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.genaiService.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/component: genai-service
    {{- include "triptailor.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.genaiService.service.name }}
  labels:
    app.kubernetes.io/component: genai-service
    {{- include "triptailor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.genaiService.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: genai-service
      {{- include "triptailor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: genai-service
        {{- include "triptailor.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "triptailor.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: genai-service
          image: "{{ .Values.genaiService.image.repository }}:{{ .Values.genaiService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.genaiService.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "triptailor.fullname" . }}-config
          env:
            - name: AZURE_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "triptailor.fullname" . }}-secret
                  key: AZURE_LLM_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.genaiService.resources | nindent 12 }}
