{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "triptailor.fullname" . }}-prometheus
  labels:
    app.kubernetes.io/component: prometheus
    {{- include "triptailor.labels" . | nindent 4 }}
data:
  # Loaded from the single source of truth shared with docker-compose. See
  # files/monitoring/ in this chart.
  prometheus.yml: |-
{{ .Files.Get "files/monitoring/prometheus/prometheus.yml" | indent 4 }}
  alert.rules.yml: |-
{{ .Files.Get "files/monitoring/prometheus/alert.rules.yml" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/component: prometheus
    {{- include "triptailor.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9090
      targetPort: http
  selector:
    app.kubernetes.io/component: prometheus
    {{- include "triptailor.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/component: prometheus
    {{- include "triptailor.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: prometheus
      {{- include "triptailor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: prometheus
        {{- include "triptailor.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the pod whenever the scrape/alert config changes.
        checksum/config: {{ .Files.Get "files/monitoring/prometheus/prometheus.yml" | sha256sum }}
        checksum/rules: {{ .Files.Get "files/monitoring/prometheus/alert.rules.yml" | sha256sum }}
    spec:
      {{- include "triptailor.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: prometheus
          image: "{{ .Values.monitoring.prometheus.image.repository }}:{{ .Values.monitoring.prometheus.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            {{- toYaml .Values.monitoring.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "triptailor.fullname" . }}-prometheus
{{- end }}
