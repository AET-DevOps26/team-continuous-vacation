{{- if and .Values.monitoring.enabled .Values.monitoring.grafana.enabled }}
{{- if .Values.monitoring.grafana.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  labels:
    app.kubernetes.io/component: grafana
    {{- include "triptailor.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- with .Values.monitoring.grafana.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.monitoring.grafana.persistence.size }}
---
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "triptailor.fullname" . }}-grafana-provisioning
  labels:
    app.kubernetes.io/component: grafana
    {{- include "triptailor.labels" . | nindent 4 }}
data:
  prometheus.yaml: |-
{{ .Files.Get "files/monitoring/grafana/provisioning/datasources/prometheus.yaml" | indent 4 }}
  tempo.yaml: |-
{{ .Files.Get "files/monitoring/grafana/provisioning/datasources/tempo.yaml" | indent 4 }}
  triptailor.yaml: |-
{{ .Files.Get "files/monitoring/grafana/provisioning/dashboards/triptailor.yaml" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "triptailor.fullname" . }}-grafana-dashboards
  labels:
    app.kubernetes.io/component: grafana
    {{- include "triptailor.labels" . | nindent 4 }}
data:
  triptailor-services.json: |-
{{ .Files.Get "files/monitoring/grafana/dashboards/triptailor-services.json" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.monitoring.grafana.service.name }}
  labels:
    app.kubernetes.io/component: grafana
    {{- include "triptailor.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.monitoring.grafana.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/component: grafana
    {{- include "triptailor.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app.kubernetes.io/component: grafana
    {{- include "triptailor.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: grafana
      {{- include "triptailor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: grafana
        {{- include "triptailor.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/provisioning: {{ printf "%s%s%s" (.Files.Get "files/monitoring/grafana/provisioning/datasources/prometheus.yaml") (.Files.Get "files/monitoring/grafana/provisioning/datasources/tempo.yaml") (.Files.Get "files/monitoring/grafana/provisioning/dashboards/triptailor.yaml") | sha256sum }}
        checksum/dashboards: {{ .Files.Get "files/monitoring/grafana/dashboards/triptailor-services.json" | sha256sum }}
    spec:
      {{- include "triptailor.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: "{{ .Values.monitoring.grafana.image.repository }}:{{ .Values.monitoring.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning/datasources/prometheus.yaml
              subPath: prometheus.yaml
              readOnly: true
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning/datasources/tempo.yaml
              subPath: tempo.yaml
              readOnly: true
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning/dashboards/triptailor.yaml
              subPath: triptailor.yaml
              readOnly: true
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards/triptailor-services.json
              subPath: triptailor-services.json
              readOnly: true
          resources:
            {{- toYaml .Values.monitoring.grafana.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.monitoring.grafana.persistence.enabled }}
          persistentVolumeClaim:
            claimName: grafana-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: grafana-provisioning
          configMap:
            name: {{ include "triptailor.fullname" . }}-grafana-provisioning
        - name: grafana-dashboards
          configMap:
            name: {{ include "triptailor.fullname" . }}-grafana-dashboards
{{- end }}
