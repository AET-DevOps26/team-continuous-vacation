apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.backend.service.name }}
  labels:
    app.kubernetes.io/component: backend
    {{- include "triptailor.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/component: backend
    {{- include "triptailor.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.service.name }}
  labels:
    app.kubernetes.io/component: backend
    {{- include "triptailor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      {{- include "triptailor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
        {{- include "triptailor.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "triptailor.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
          env:
            - name: PERSISTENCE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "triptailor.fullname" . }}-config
                  key: PERSISTENCE_BASE_URL
            - name: GENAI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "triptailor.fullname" . }}-config
                  key: GENAI_BASE_URL
            - name: JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "triptailor.fullname" . }}-config
                  key: JWT_ISSUER
            - name: JWT_TTL_DAYS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "triptailor.fullname" . }}-config
                  key: JWT_TTL_DAYS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "triptailor.fullname" . }}-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
